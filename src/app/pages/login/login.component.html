<div style="max-width: 400px; margin: 100px auto; background-color: #fff; padding: 40px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;">
  
  <h2 style="color: #333; margin-top: 0; margin-bottom: 10px;">Luma Academy</h2>
  <p style="color: #666; margin-bottom: 30px;">Inicia sesión para acceder al sistema</p>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group" style="text-align: left;">
      <label class="form-label">Usuario</label>
      <input type="text" formControlName="username" class="form-input" placeholder="Ej. admin">
    </div>

    <div class="form-group" style="text-align: left;">
      <label class="form-label">Contraseña</label>
      <input type="password" formControlName="password" class="form-input" placeholder="******">
    </div>

    <div *ngIf="errorMessage" style="color: #dc3545; background-color: #f8d7da; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; font-size: 14px;">
      {{ errorMessage }}
    </div>

    <button type="submit" class="btn-main" style="width: 100%; margin-bottom: 0; padding: 12px; font-size: 16px;" [disabled]="loginForm.invalid">
      Ingresar
    </button>

  </form>
</div>
