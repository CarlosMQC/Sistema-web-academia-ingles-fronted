<div class="container">
  <h2>{{ isEdit ? 'Editar Matrícula' : 'Nueva Matrícula' }}</h2>

  <form [formGroup]="form" (ngSubmit)="operate()">
    
    <div class="form-group" *ngIf="isEdit">
      <label>ID</label>
      <input type="number" formControlName="idEnrollment" readonly class="readonly-input">
    </div>

    <div class="form-group">
      <label>Estudiante</label>
      <select formControlName="studentId" class="select-input">
        <option value="" disabled selected>Seleccione un estudiante...</option>
        <option *ngFor="let s of students" [value]="s.idStudent">
          {{ s.firstName }} {{ s.lastName }} - DNI: {{ s.dni }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label>Curso</label>
      <select formControlName="courseId" class="select-input">
        <option value="" disabled selected>Seleccione un curso...</option>
        <option *ngFor="let c of courses" [value]="c.idCourse">
          {{ c.name }}
        </option>
      </select>
    </div>

    <div class="form-group checkbox-group">
      <input type="checkbox" formControlName="status" id="statusCheck">
      <label for="statusCheck">Matrícula Activa</label>
    </div>

    <div class="action-bar">
      <button type="submit" class="btn-primary" [disabled]="form.invalid">Guardar</button>
      <button type="button" class="btn-secondary" routerLink="/enrollments">Cancelar</button>
    </div>

  </form>
</div>
