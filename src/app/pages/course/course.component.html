<h2>Gestión de Cursos</h2>

<form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
  <div>
    <label>Nombre del Curso:</label>
    <input type="text" formControlName="name">
  </div>

  <div>
    <label>Descripción:</label>
    <input type="text" formControlName="description">
  </div>

  <div>
    <label>Estado:</label>
    <select formControlName="status">
      <option [ngValue]="true">Activo</option>
      <option [ngValue]="false">Inactivo</option>
    </select>
  </div>

  <button type="submit" [disabled]="courseForm.invalid">Guardar</button>
</form>

<hr>

<h3>Lista de Cursos</h3>
<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Descripción</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    @for (course of items(); track course.idCourse) {
      <tr>
        <td>{{ course.idCourse }}</td>
        <td>{{ course.name }}</td>
        <td>{{ course.description }}</td>
        <td>{{ course.status ? 'Activo' : 'Inactivo' }}</td>
        <td>
          <button (click)="edit(course)">Editar</button>
          <button (click)="delete(course.idCourse)">Eliminar</button>
        </td>
      </tr>
    } @empty {
      <tr>
        <td colspan="5">No hay cursos registrados todavía.</td>
      </tr>
    }
  </tbody>
</table>
