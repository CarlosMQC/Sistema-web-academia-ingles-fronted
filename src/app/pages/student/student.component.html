<div class="container">
  <h2>Gestión de Estudiantes</h2>
  
  <div class="action-bar">
    <button class="btn-primary" routerLink="/students/new">Crear Nuevo Estudiante</button>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Nombres</th>
        <th>Apellidos</th>
        <th>DNI</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of students">
        <td>{{ s.idStudent }}</td>
        <td>{{ s.firstName }}</td>
        <td>{{ s.lastName }}</td>
        <td>{{ s.dni }}</td>
        <td>
          <span [class]="s.status ? 'status-active' : 'status-inactive'">
            {{ s.status ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
        <td>
          <button class="btn-edit" [routerLink]="['/students/edit', s.idStudent]">Editar</button>
          <button class="btn-delete" (click)="delete(s.idStudent)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
