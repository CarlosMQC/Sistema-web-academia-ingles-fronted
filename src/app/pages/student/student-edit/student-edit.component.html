<div class="container">
  <h2>{{ isEdit ? 'Editar Estudiante' : 'Nuevo Estudiante' }}</h2>

  <form [formGroup]="form" (ngSubmit)="operate()">
    
    <div class="form-group" *ngIf="isEdit">
      <label>ID</label>
      <input type="number" formControlName="idStudent" readonly class="readonly-input">
    </div>

    <div class="form-group">
      <label>Nombres</label>
      <input type="text" formControlName="firstName">
    </div>

    <div class="form-group">
      <label>Apellidos</label>
      <input type="text" formControlName="lastName">
    </div>

    <div class="form-group">
      <label>DNI</label>
      <input type="text" formControlName="dni" maxlength="8">
    </div>

    <div class="form-group checkbox-group">
      <input type="checkbox" formControlName="status" id="statusCheck">
      <label for="statusCheck">Estudiante Activo</label>
    </div>

    <div class="action-bar">
      <button type="submit" class="btn-primary" [disabled]="form.invalid">Guardar</button>
      <button type="button" class="btn-secondary" routerLink="/students">Cancelar</button>
    </div>

  </form>
</div>
